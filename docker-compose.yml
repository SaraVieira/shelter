services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coverage_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/coverage_tracker
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_GITHUB_ID=${BETTER_AUTH_GITHUB_ID}
      - BETTER_AUTH_GITHUB_SECRET=${BETTER_AUTH_GITHUB_SECRET}
      - BETTER_AUTH_BASE_URL=http://localhost:3000
      - BETTER_AUTH_URL=http://localhost:3000
      - RETENTION_FILE_DAYS=${RETENTION_FILE_DAYS:-90}
      - RETENTION_FULL_DAYS=${RETENTION_FULL_DAYS:-365}
    depends_on:
      - postgres

volumes:
  pgdata:
